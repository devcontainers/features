name: "PR - Test Updated Features (arm64)"
on:
  pull_request:
    # NOTE: To extend this workflow to other features, add path entries below
    # following the same pattern, e.g.:
    #   - "src/<feature-name>/**"
    #   - "test/<feature-name>/**"
    paths:
      - "src/powershell/**"
      - "test/powershell/**"
      - "src/docker-in-docker/**"
      - "test/docker-in-docker/**"      

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # NOTE: To extend this workflow to other features, add filter entries below
          # following the same pattern, e.g.:
          #   <feature-name>: ./**/<feature-name>/**
          filters: |
            powershell: ./**/powershell/**
            docker-in-docker: ./**/docker-in-docker/**

  test:
    needs: [detect-changes]
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    strategy:
      matrix:
        features: ${{ fromJSON(needs.detect-changes.outputs.features) }}
        # NOTE: ubuntu:focal and debian:11 are excluded because they ship
        # GLIBC 2.31, but PowerShell >= 7.6.0 requires GLIBC 2.33+ on arm64.
        # ubuntu:focal reached EOL Apr 2025; debian:11 reaches EOL Aug 2026.
        baseImage:
          [
            "ubuntu:jammy",
            "debian:12",
            "mcr.microsoft.com/devcontainers/base:ubuntu",
            "mcr.microsoft.com/devcontainers/base:debian",
            "mcr.microsoft.com/devcontainers/base:noble"
          ]
        exclude:
          - features: docker-in-docker
            baseImage: mcr.microsoft.com/devcontainers/base:debian
          - features: docker-in-docker
            baseImage: mcr.microsoft.com/devcontainers/base:ubuntu       
    steps:
      - uses: actions/checkout@v6

      - name: "Load erofs module and verify"
        run: sudo modprobe erofs && grep erofs /proc/filesystems

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test  --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    needs: [detect-changes]
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    strategy:
      matrix:
        features: ${{ fromJSON(needs.detect-changes.outputs.features) }}
    steps:
      - uses: actions/checkout@v6

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Exclude iptables-isolation scenarios from docker-in-docker"
        if: matrix.features == 'docker-in-docker'
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          sed 's://.*$::' test/docker-in-docker/scenarios.json \
            | jq 'del(.docker_with_default_iptables, .docker_with_default_iptables_ubuntu)' \
            > test/docker-in-docker/scenarios.json.tmp
          mv test/docker-in-docker/scenarios.json.tmp test/docker-in-docker/scenarios.json

      - name: "Testing '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated  .
